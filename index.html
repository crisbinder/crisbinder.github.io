<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Cris 摄影集</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 顶部 -->
<header>
  <h1>CrisBinder</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="搜索图片...">
  </div>

  <div class="categories">
    <button data-cat="all" class="active">全部</button>
    <button data-cat="landscape">风光</button>
    <button data-cat="stars">星空</button>
    <button data-cat="portrait">人像</button>
    <button data-cat="humanity">人文</button>
  </div>
</header>

<!-- 图片区域 -->
<main id="gallery"></main>

<!-- 全屏查看 -->
<div id="viewer" class="hidden">
  <img id="viewer-img">
</div>

<!-- 暗黑模式按钮 -->
<div id="theme-toggle">🌙</div>

<script src="js/app.js"></script>
</body>
</html>
