<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的摄影集</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="glass-header">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索你想要的素材...">
        </div>
        <nav class="categories">
            <button class="cat-btn active" data-cat="all">全部</button>
            <button class="cat-btn" data-cat="1">风光</button>
            <button class="cat-btn" data-cat="2">星空</button>
            <button class="cat-btn" data-cat="3">人像</button>
            <button class="cat-btn" data-cat="4">人文</button>
        </nav>
    </header>

    <main>
        <div class="gallery" id="gallery">
            </div>
    </main>

    <button class="theme-toggle" id="themeToggle">🌙</button>

    <div class="lightbox" id="lightbox">
        <img src="" alt="全屏图片" id="lightboxImg">
    </div>

    <script src="js/app.js"></script>
</body>
</html>
